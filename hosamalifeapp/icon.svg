<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#007AFF"/>
      <stop offset="50%" stop-color="#5856D6"/>
      <stop offset="100%" stop-color="#AF52DE"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="280" rx="112" ry="112" fill="url(#shine)"/>
  <circle cx="256" cy="256" r="170" fill="rgba(255,255,255,0.12)"/>
  <text x="256" y="320" font-family="-apple-system, 'SF Pro Display', system-ui, sans-serif" font-size="240" font-weight="800" text-anchor="middle" fill="white" filter="url(#glow)">ح</text>
  <circle cx="380" cy="135" r="20" fill="rgba(255,255,255,0.5)"/>
  <circle cx="420" cy="155" r="10" fill="rgba(255,255,255,0.3)"/>
</svg>
